name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend || steps.manual.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend || steps.manual.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set both for manual run
        id: manual
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "backend=true" >> "$GITHUB_OUTPUT"
          echo "frontend=true" >> "$GITHUB_OUTPUT"

      - name: Detect changed paths
        id: filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'api/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'ui/**'
              - '.github/workflows/ci.yml'

  backend-lint:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: ruff
        run: ruff check src tests
      - name: black --check
        run: black --check src tests
      - name: mypy
        run: mypy src || echo "::warning::mypy reported issues (non-blocking while types are being adopted)"

  backend-test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: pytest
        env:
          # Keep tests hermetic: no network, deterministic logging.
          LOG_FORMAT: pretty
          LOG_LEVEL: WARNING
          DATABASE_URL: "postgresql+psycopg2://postgres:postgres@localhost:5432/postgres"
        run: |
          # --ignore=tests/integration: tests there are pre-existing and marker-excluded,
          # but some fail at collection time (e.g. llama_cloud version mismatch).
          pytest -m "not live and not integration" \
            --ignore=tests/integration \
            --cov=src --cov-report=xml --cov-report=term \
            --cov-fail-under=15
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: api/coverage.xml

  backend-security:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install 'bandit[toml]' pip-audit
          pip install -e .
      - name: bandit
        run: bandit -r src -ll -c pyproject.toml
      - name: pip-audit
        # Don't fail builds on every transitive advisory — surface them.
        run: pip-audit --strict || echo "::warning::pip-audit found vulnerabilities (review above)"

  frontend-lint:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "ui/package-lock.json"
      - run: npm ci
      - name: eslint
        run: npm run lint
      - name: prettier --check
        run: npx --yes prettier@3 --check "app/**/*.{ts,tsx,js,jsx,json,css,md}" "components/**/*.{ts,tsx,js,jsx,json,css,md}" || echo "::warning::prettier reported formatting issues"
      - name: tsc --noEmit
        run: npx tsc --noEmit

  frontend-test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "ui/package-lock.json"
      - run: npm ci
      - name: vitest
        run: npm test --if-present -- --run || echo "::warning::no vitest tests wired yet"

  codeql:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
