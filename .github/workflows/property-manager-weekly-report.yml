# Example: weekly trigger for POST /internal/property-manager/reports/send-weekly
# Configure repository secrets: PM_WEEKLY_API_BASE_URL, PM_WEEKLY_CRON_SECRET

name: Property manager weekly email

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 14 * * 1"

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send weekly reports
        env:
          API_BASE: ${{ secrets.PM_WEEKLY_API_BASE_URL }}
          CRON_SECRET: ${{ secrets.PM_WEEKLY_CRON_SECRET }}
        run: |
          if [ -z "$API_BASE" ] || [ -z "$CRON_SECRET" ]; then
            echo "PM_WEEKLY_API_BASE_URL and PM_WEEKLY_CRON_SECRET must be set" >&2
            exit 1
          fi
          curl -sS -f -X POST "${API_BASE%/}/internal/property-manager/reports/send-weekly" \
            -H "X-Internal-Cron-Secret: ${CRON_SECRET}"
