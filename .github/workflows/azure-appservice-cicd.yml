name: CI/CD - Azure App Service (zero downtime)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ACR_NAME: wademehomeacr
  ACR_LOGIN_SERVER: wademehomeacr.azurecr.io
  AZURE_RESOURCE_GROUP: wademehome-rg
  AZURE_WEBAPP_BACKEND: wademehome-backend
  AZURE_WEBAPP_BACKEND_SLOT: staging
  AZURE_WEBAPP_FRONTEND: wademehome
  AZURE_WEBAPP_FRONTEND_SLOT: staging
  BACKEND_IMAGE_NAME: wademehome-backend
  FRONTEND_IMAGE_NAME: wademehome-frontend
  NEXT_PUBLIC_CHAT_API_URL: https://wademehome-backend.azurewebsites.net
  NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
  NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend || steps.manual.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend || steps.manual.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set both for manual run
        id: manual
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "backend=true" >> "$GITHUB_OUTPUT"
          echo "frontend=true" >> "$GITHUB_OUTPUT"

      - name: Detect changed paths
        id: filter
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'api/**'
            frontend:
              - 'ui/**'
          base: ${{ github.event.before }}
          ref: ${{ github.sha }}

  test-backend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Backend smoke check
        run: python -m compileall src

  test-frontend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "ui/package-lock.json"

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint and build frontend
        env:
          NEXT_PUBLIC_CHAT_API_URL: ${{ env.NEXT_PUBLIC_CHAT_API_URL }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ env.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ env.NEXT_PUBLIC_MAPBOX_TOKEN }}
        run: |
          npm run lint
          npm run build

  build-backend:
    runs-on: ubuntu-latest
    needs: [changes, test-backend]
    if: always() && needs.changes.outputs.backend == 'true' && needs.test-backend.result == 'success'
    outputs:
      IMAGE_TAG: ${{ steps.tag.outputs.IMAGE_TAG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name "$ACR_NAME"

      - name: Build and push backend image
        run: |
          docker build -t "$ACR_LOGIN_SERVER/$BACKEND_IMAGE_NAME:$GITHUB_SHA" ./api
          docker push "$ACR_LOGIN_SERVER/$BACKEND_IMAGE_NAME:$GITHUB_SHA"

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=$GITHUB_SHA" >> "$GITHUB_OUTPUT"

  build-frontend:
    runs-on: ubuntu-latest
    needs: [changes, test-frontend]
    if: always() && needs.changes.outputs.frontend == 'true' && needs.test-frontend.result == 'success'
    outputs:
      IMAGE_TAG: ${{ steps.tag.outputs.IMAGE_TAG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name "$ACR_NAME"

      - name: Build and push frontend image
        run: |
          docker build -t "$ACR_LOGIN_SERVER/$FRONTEND_IMAGE_NAME:$GITHUB_SHA" \
            --build-arg NEXT_PUBLIC_CHAT_API_URL="${{ env.NEXT_PUBLIC_CHAT_API_URL }}" \
            --build-arg NEXT_PUBLIC_GA_MEASUREMENT_ID="${{ env.NEXT_PUBLIC_GA_MEASUREMENT_ID }}" \
            --build-arg NEXT_PUBLIC_MAPBOX_TOKEN="${{ env.NEXT_PUBLIC_MAPBOX_TOKEN }}" \
            ./ui
          docker push "$ACR_LOGIN_SERVER/$FRONTEND_IMAGE_NAME:$GITHUB_SHA"

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=$GITHUB_SHA" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: [changes, build-backend, build-frontend]
    if: always() && (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success')
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend to staging slot
        if: needs.build-backend.result == 'success'
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_BACKEND }}
          slot-name: ${{ env.AZURE_WEBAPP_BACKEND_SLOT }}
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE_NAME }}:${{ needs.build-backend.outputs.IMAGE_TAG }}

      # Slot swap pings staging over HTTP; cold container pulls can exceed Azure's default patience.
      - name: Wait for backend staging HTTP (before swap)
        if: needs.build-backend.result == 'success'
        run: |
          set -euo pipefail
          URL="https://${AZURE_WEBAPP_BACKEND}-${AZURE_WEBAPP_BACKEND_SLOT}.azurewebsites.net/health"
          echo "Waiting for: $URL"
          MAX_ATTEMPTS=60
          SLEEP_SECS=10
          for i in $(seq 1 "$MAX_ATTEMPTS"); do
            if curl -fsS --max-time 30 "$URL" >/dev/null 2>&1; then
              echo "Backend staging responded OK (attempt $i/$MAX_ATTEMPTS)"
              exit 0
            fi
            echo "Backend staging not ready yet (attempt $i/$MAX_ATTEMPTS), sleeping ${SLEEP_SECS}s..."
            sleep "$SLEEP_SECS"
          done
          echo "Timeout: backend staging never became healthy. Check slot logs and WEBSITES_PORT / container startup."
          exit 1

      - name: Swap backend staging into production
        if: needs.build-backend.result == 'success'
        run: |
          az webapp deployment slot swap \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_BACKEND" \
            --slot "$AZURE_WEBAPP_BACKEND_SLOT" \
            --target-slot production

      - name: Deploy frontend to staging slot
        if: needs.build-frontend.result == 'success'
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_FRONTEND }}
          slot-name: ${{ env.AZURE_WEBAPP_FRONTEND_SLOT }}
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ needs.build-frontend.outputs.IMAGE_TAG }}

      - name: Wait for frontend staging HTTP (before swap)
        if: needs.build-frontend.result == 'success'
        run: |
          set -euo pipefail
          URL="https://${AZURE_WEBAPP_FRONTEND}-${AZURE_WEBAPP_FRONTEND_SLOT}.azurewebsites.net/"
          echo "Waiting for: $URL"
          MAX_ATTEMPTS=60
          SLEEP_SECS=10
          for i in $(seq 1 "$MAX_ATTEMPTS"); do
            if curl -fsSL --max-time 45 "$URL" >/dev/null 2>&1; then
              echo "Frontend staging responded OK (attempt $i/$MAX_ATTEMPTS)"
              exit 0
            fi
            echo "Frontend staging not ready yet (attempt $i/$MAX_ATTEMPTS), sleeping ${SLEEP_SECS}s..."
            sleep "$SLEEP_SECS"
          done
          echo "Timeout: frontend staging never became healthy. Check slot logs, ACR AcrPull on the slot identity, and WEBSITES_PORT=3000."
          exit 1

      - name: Swap frontend staging into production
        if: needs.build-frontend.result == 'success'
        run: |
          az webapp deployment slot swap \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_FRONTEND" \
            --slot "$AZURE_WEBAPP_FRONTEND_SLOT" \
            --target-slot production
