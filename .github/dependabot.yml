version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/api"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      python-minor:
        update-types: ["minor", "patch"]
    ignore:
      # langchain 1.x is a ground-up rewrite; keep <1 cap until we migrate.
      - dependency-name: "langchain"
        update-types: ["version-update:semver-major"]
      # griffe 2.x breaks the Object model used by mkdocstrings-python.
      - dependency-name: "griffe"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      npm-minor:
        update-types: ["minor", "patch"]
    ignore:
      # Major framework/test-stack upgrades need dedicated migration PRs.
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      # @llamaindex/chat-ui ships breaking API changes as minors (0.x line).
      # Upgrade in dedicated PRs after migrating call sites.
      - dependency-name: "@llamaindex/chat-ui"
      # @types/react 19.2 has a JSX-namespace regression; pin until resolved.
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-minor"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"

  - package-ecosystem: "docker"
    directory: "/api"
    schedule:
      interval: "weekly"
    ignore:
      # Stay on LTS-stable Python. Evaluate new majors manually.
      - dependency-name: "python"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/ui"
    schedule:
      interval: "weekly"
    ignore:
      # Only upgrade Node across LTS lines; skip odd non-LTS majors.
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
